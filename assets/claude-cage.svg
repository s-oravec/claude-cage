        stroke="#CC5500"
        stroke-width="0.5"/>
  <!-- Cage bars inside shield -->
  <g stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round">
    <!-- Vertical bars -->
    <line x1="5.5" y1="5" x2="5.5" y2="11"/>
    <line x1="8" y1="4" x2="8" y2="12"/>
    <line x1="10.5" y1="5" x2="10.5" y2="11"/>
    <!-- Horizontal bars -->
    <line x1="4.5" y1="6.5" x2="11.5" y2="6.5"/>
    <line x1="4" y1="9" x2="12" y2="9"/>
  </g>
</svg>
